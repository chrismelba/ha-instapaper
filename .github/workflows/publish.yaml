name: Publish Add-on

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    name: Build Add-on for ${{ matrix.arch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up build arguments
        id: build_args
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "platform=linux/arm64" >> $GITHUB_ENV
          else
            echo "platform=linux/amd64" >> $GITHUB_ENV
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./instapaper-feeds
          file: ./instapaper-feeds/Dockerfile
          platforms: ${{ env.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ha-instapaper-feeds-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/alpine-base:7.3.3
